    <script>
      // 관리자 PWA 감지 — manifest 교체 + sessionStorage 플래그 세팅
      // React 모듈 로드 전에 실행되어야 함
      (function() {
        var isAdminPWA = new URLSearchParams(location.search).get('admin_pwa') === '1';
        if (isAdminPWA) {
          sessionStorage.setItem('_admin_pwa', '1');
          var l = document.createElement('link');
          l.rel = 'manifest'; l.href = '/admin-manifest.webmanifest';
          document.head.appendChild(l);
        } else if (sessionStorage.getItem('_admin_pwa') === '1') {
          // 관리자 PWA에서 내부 탐색 중 (URL param 없어도 manifest 유지)
          var l2 = document.createElement('link');
          l2.rel = 'manifest'; l2.href = '/admin-manifest.webmanifest';
          document.head.appendChild(l2);
        }
      })();
    </script>
