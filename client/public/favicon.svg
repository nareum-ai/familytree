<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 1세대: 루트 (맨 위 중앙) -->
  <circle cx="256" cy="88" r="52" fill="white"/>

  <!-- 루트 → 수직선 → 가로 분기선 -->
  <line x1="256" y1="140" x2="256" y2="196" stroke="rgba(255,255,255,0.75)" stroke-width="18" stroke-linecap="round"/>
  <line x1="128" y1="196" x2="384" y2="196" stroke="rgba(255,255,255,0.75)" stroke-width="18" stroke-linecap="round"/>

  <!-- 2세대: 수직선 + 원 -->
  <line x1="128" y1="196" x2="128" y2="268" stroke="rgba(255,255,255,0.65)" stroke-width="15" stroke-linecap="round"/>
  <line x1="384" y1="196" x2="384" y2="268" stroke="rgba(255,255,255,0.65)" stroke-width="15" stroke-linecap="round"/>
  <circle cx="128" cy="308" r="42" fill="white" opacity="0.92"/>
  <circle cx="384" cy="308" r="42" fill="white" opacity="0.92"/>

  <!-- 2세대 → 가로 분기선 -->
  <line x1="128" y1="350" x2="128" y2="390" stroke="rgba(255,255,255,0.55)" stroke-width="12" stroke-linecap="round"/>
  <line x1="64"  y1="390" x2="192" y2="390" stroke="rgba(255,255,255,0.55)" stroke-width="12" stroke-linecap="round"/>
  <line x1="384" y1="350" x2="384" y2="390" stroke="rgba(255,255,255,0.55)" stroke-width="12" stroke-linecap="round"/>
  <line x1="320" y1="390" x2="448" y2="390" stroke="rgba(255,255,255,0.55)" stroke-width="12" stroke-linecap="round"/>

  <!-- 3세대: 수직선 + 원 -->
  <line x1="64"  y1="390" x2="64"  y2="424" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <line x1="192" y1="390" x2="192" y2="424" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <line x1="320" y1="390" x2="320" y2="424" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <line x1="448" y1="390" x2="448" y2="424" stroke="rgba(255,255,255,0.45)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="64"  cy="452" r="30" fill="white" opacity="0.78"/>
  <circle cx="192" cy="452" r="30" fill="white" opacity="0.78"/>
  <circle cx="320" cy="452" r="30" fill="white" opacity="0.78"/>
  <circle cx="448" cy="452" r="30" fill="white" opacity="0.78"/>
</svg>
